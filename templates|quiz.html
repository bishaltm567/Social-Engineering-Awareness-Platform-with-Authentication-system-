<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body>
    <h2>Security Awareness Quiz</h2>

    <form method="POST">
        {% for q in questions %}
            <p>{{ loop.index }}. {{ q.question }}</p>

            {% for opt in q.options %}
                <input type="radio" name="q{{ loop.index0 }}" value="{{ opt }}" required> {{ opt }}<br>
            {% endfor %}
        {% endfor %}

        <br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
